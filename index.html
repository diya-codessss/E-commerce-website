<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shopzone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class = "nav-bar">
    <a href="All">All</a>
    <a href="Electronics">Electronics</a>
    <a href="fashion">fashion</a>
    <a href="shoes">shoes</a>
    <a href="watches">watches</a>
    </div>
    <div class="search-box">
        <input type="text" placeholder="search products...">
        <button>Search</button>
    </div>
    <section class="hero">

    <div class="hero-text">

        <h1>Discover the Best Collection</h1>

        <p>
            Shop premium fashion, electronics and accessories
            at unbeatable prices.
        </p>

        <button class="shop-btn">Shop Now</button>

    </div>

    <div class="hero-image">

        <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=600"
             alt="Shopping">

    </div>

</section>
 <section class="offer-banner">
        <h2>Flat 50% OFF on Summer Collection</h2>
        <p>Limited Time Offer. Grab Your Favorite Products Now!</p>
    </section>

    <section class="categories">

        <h2>Shop By Category</h2>

        <div class="category-container">

            <div class="category-card">
                <h3> Fashion</h3>
            </div>

            <div class="category-card">
                <h3> Electronics</h3>
            </div>

            <div class="category-card">
                <h3>Shoes</h3>
            </div>

            <div class="category-card">
                <h3>Watches</h3>
            </div>

        </div>

    </section>
</body>
</html>
